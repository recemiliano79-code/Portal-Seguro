<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel — Contraseña actualizada</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0b26;--bg2:#110f2e;--bdr:rgba(108,68,255,.15);--tx:#e8e4f8;--mt:#6b6085;--font:system-ui,sans-serif;}
body{background:var(--bg);color:var(--tx);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;}
.orb1{width:400px;height:400px;background:rgba(52,211,153,.07);top:-100px;left:-100px;}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;text-align:center;}
.icon-wrap{width:80px;height:80px;border-radius:50%;background:rgba(52,211,153,.12);border:2px solid rgba(52,211,153,.3);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 20px;animation:pop .4s ease;}
@keyframes pop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.card::before{content:'';display:block;height:3px;margin:-32px -28px 28px;border-radius:20px 20px 0 0;background:linear-gradient(90deg,#059669,#34d399,#67e8f9);}
h2{font-size:1.3rem;font-weight:900;margin-bottom:8px;color:#34d399;}
p{font-size:.84rem;color:var(--mt);line-height:1.65;margin-bottom:20px;}
.btn-main{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;font-size:.88rem;font-weight:800;text-decoration:none;transition:all .15s;}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.4);}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="wrap">
  <div class="card">
    <div class="icon-wrap">✅</div>
    <h2>¡Contraseña actualizada!</h2>
    <p>Tu contraseña ha sido cambiada exitosamente. Ya puedes iniciar sesión con tu nueva contraseña.</p>
    <a href="{% url 'accounts:login' %}" class="btn-main">
      <i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión
    </a>
  </div>
</div>
</body>
</html>
