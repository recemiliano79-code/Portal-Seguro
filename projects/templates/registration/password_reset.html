<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentinel — Recuperar contraseña</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0d0b26;--bg2:#110f2e;--bdr:rgba(108,68,255,.15);--tx:#e8e4f8;--mt:#6b6085;--font:system-ui,sans-serif;}
body{background:var(--bg);color:var(--tx);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;}
.orb1{width:400px;height:400px;background:rgba(124,58,237,.08);top:-100px;right:-100px;}
.orb2{width:300px;height:300px;background:rgba(103,232,249,.05);bottom:-80px;left:-80px;}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#5b21b6);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 12px;box-shadow:0 8px 30px rgba(124,58,237,.35);}
.logo-name{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,#f8f5ff,#c4b5fd 50%,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:.72rem;color:var(--mt);text-transform:uppercase;letter-spacing:2px;margin-top:3px;}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:20px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.card::before{content:'';display:block;height:3px;margin:-28px -28px 24px;border-radius:20px 20px 0 0;background:linear-gradient(90deg,#7c3aed,#f472b6,#67e8f9);}
.card-title{font-size:1.1rem;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:9px;}
.card-desc{font-size:.8rem;color:var(--mt);line-height:1.6;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt);margin-bottom:6px;}
.form-group input{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(130,90,255,.18);border-radius:9px;padding:10px 13px;color:var(--tx);font-size:.88rem;font-family:var(--font);outline:none;transition:border-color .15s;}
.form-group input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.12);}
.form-group input::placeholder{color:var(--mt);}
.btn-main{width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#5b21b6);border:none;color:#fff;font-size:.88rem;font-weight:800;cursor:pointer;transition:all .15s;font-family:var(--font);}
.btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,.4);}
.back-link{display:flex;align-items:center;gap:6px;margin-top:16px;font-size:.78rem;color:var(--mt);text-decoration:none;justify-content:center;transition:color .15s;}
.back-link:hover{color:#a78bfa;}
.info-box{background:rgba(103,232,249,.07);border:1px solid rgba(103,232,249,.18);border-radius:10px;padding:12px 15px;font-size:.78rem;color:#67e8f9;margin-bottom:18px;display:flex;gap:9px;align-items:flex-start;line-height:1.55;}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🔑</div>
    <div class="logo-name">Sentinel</div>
    <div class="logo-sub">Recuperar contraseña</div>
  </div>
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-key" style="color:#a78bfa;"></i> Restablecer contraseña</div>
    <div class="card-desc">Ingresa tu correo electrónico y te enviaremos un enlace para crear una nueva contraseña.</div>

    <div class="info-box">
      <i class="fa-solid fa-circle-info" style="flex-shrink:0;margin-top:1px;"></i>
      <span>El enlace será válido por <strong>24 horas</strong>. Revisa también tu carpeta de spam.</span>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label><i class="fa-solid fa-envelope" style="margin-right:5px;"></i>Correo electrónico</label>
        <input type="email" name="email" placeholder="tu@correo.com" autofocus required>
      </div>
      <button type="submit" class="btn-main">
        <i class="fa-solid fa-paper-plane" style="margin-right:7px;"></i>Enviar enlace de recuperación
      </button>
    </form>
    <a href="{% url 'accounts:login' %}" class="back-link">
      <i class="fa-solid fa-arrow-left"></i> Volver al inicio de sesión
    </a>
  </div>
</div>
</body>
</html>
